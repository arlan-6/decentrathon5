services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decentrathon-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/decentrathon
      APP_NAME: Decentrathon Backend
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: decentrathon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: decentrathon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decentrathon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
